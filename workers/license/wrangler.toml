name = "dg"
main = "src/index.js"
compatibility_date = "2024-11-01"

# KV namespace binding (create with `wrangler kv namespace create DG`, then
# paste the returned id here).
[[kv_namespaces]]
binding = "DG"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# ---------------------------------------------------------------------------
# Secrets (set with `wrangler secret put <NAME>` — do NOT commit real values):
#   ADMIN_KEY              long random string; typed once on the web Loader page
#   SUPABASE_URL           https://<project-ref>.supabase.co
#   SUPABASE_SERVICE_KEY   Supabase service-role key (server-side only)
#
# Deploy:
#   cd workers/license
#   wrangler kv namespace create DG      # then set id above
#   wrangler secret put ADMIN_KEY
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_KEY
#   wrangler deploy
#
# The deployed URL becomes VITE_LICENSE_WORKER_URL in the web app's env.
# ---------------------------------------------------------------------------
